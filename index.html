<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TRADE SIGNAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e17;
            --card: #121927;
            --border: #1e2a3d;
            --text: #e8edf5;
            --text-secondary: #7a8aa8;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.12);
            --accent-gradient: linear-gradient(135deg, #00d4ff, #7b2ffc);
        }
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 14px;
            overflow-x: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 17px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .lang-selector {
            display: flex;
            gap: 4px;
        }
        .lang-btn {
            padding: 4px 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .lang-btn.active {
            border-color: var(--accent);
            color: #fff;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .lang-btn:hover { border-color: var(--accent); }
        .balance {
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(0,212,255,0.08);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0,212,255,0.15);
        }
        .balance span { color: var(--accent); font-weight: 700; }

        /* ВЫБОР ПАРЫ — КАК В ПРИМЕРЕ */
        .pair-selector {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .pair-selector::-webkit-scrollbar { width: 3px; }
        .pair-selector::-webkit-scrollbar-track { background: var(--bg); }
        .pair-selector::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .pair-btn {
            padding: 10px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            width: 100%;
        }
        .pair-btn.active {
            background: var(--accent-gradient);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .pair-btn:hover { border-color: var(--accent); }

        .timeframe-row {
            display: flex;
            gap: 6px;
            margin: 8px 0 16px 0;
            flex-wrap: wrap;
        }
        .tf-btn {
            padding: 6px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 44px;
            text-align: center;
        }
        .tf-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .tf-btn:hover { border-color: var(--accent); }

        .signal-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px 20px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        .signal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.8s;
            pointer-events: none;
        }
        .signal-card.active::before { opacity: 1; }
        .signal-card.waiting { opacity: 0.6; }

        .signal-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .signal-label .pair {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .signal-label .pair small {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 6px;
        }
        .signal-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .signal-badge.waiting {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .signal-badge.up {
            background: rgba(0, 212, 170, 0.15);
            color: #00d4aa;
            border: 1px solid rgba(0, 212, 170, 0.3);
        }
        .signal-badge.down {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .signal-badge.timer {
            background: rgba(255, 165, 0, 0.15);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.3);
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .signal-direction {
            font-size: 52px;
            text-align: center;
            padding: 6px 0;
            font-weight: 300;
        }
        .signal-direction.up { color: #00d4aa; }
        .signal-direction.down { color: #ff4757; }
        .signal-direction.timer { color: #ffa500; font-size: 36px; }

        .signal-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px 12px;
            margin: 10px 0 4px 0;
        }
        .signal-details .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .signal-details .item .label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .signal-details .item .value {
            font-size: 15px;
            font-weight: 700;
            margin-top: 2px;
        }
        .signal-details .item .value.down { color: #ff4757; }
        .signal-details .item .value.up { color: #00d4aa; }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .timer-display {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #ffa500;
            padding: 10px 0;
            letter-spacing: 2px;
        }

        @media (max-width: 480px) {
            .signal-details { grid-template-columns: 1fr 1fr 1fr; }
            .signal-label .pair { font-size: 17px; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .header-right { justify-content: center; flex-wrap: wrap; }
            .balance { font-size: 12px; }
            .tf-btn { min-width: 38px; font-size: 11px; padding: 5px 10px; }
            .pair-btn { font-size: 13px; padding: 8px 14px; }
            .timer-display { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="appTitle">📊 TRADE SIGNAL</h1>
        <div class="header-right">
            <div class="lang-selector">
                <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">РУ</button>
                <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                <button class="lang-btn" data-lang="uk" onclick="setLang('uk')">UA</button>
                <button class="lang-btn" data-lang="kz" onclick="setLang('kz')">KZ</button>
            </div>
            <div class="balance">💰 <span id="balanceDisplay">1000</span></div>
        </div>
    </div>

    <!-- ПАРЫ В ВИДЕ СПИСКА -->
    <div class="pair-selector" id="pairSelector"></div>

    <div class="timeframe-row" id="timeframeRow">
        <button class="tf-btn" data-tf="1м">1м</button>
        <button class="tf-btn active" data-tf="3м">3м</button>
        <button class="tf-btn" data-tf="5м">5м</button>
        <button class="tf-btn" data-tf="15м">15м</button>
        <button class="tf-btn" data-tf="30м">30м</button>
        <button class="tf-btn" data-tf="1ч">1ч</button>
    </div>

    <div class="signal-card" id="signalCard">
        <div class="signal-label">
            <span class="pair" id="currentPair">EUR/USD <small>Forex</small></span>
            <span class="signal-badge waiting" id="signalBadge">⏳ Ожидание</span>
        </div>
        <div class="signal-direction" id="signalDirection">⟷</div>
        <div class="timer-display" id="timerDisplay" style="display:none;">⏱️ 01:00</div>
        <div class="signal-details">
            <div class="item">
                <span class="label" id="lblTF">Таймфрейм</span>
                <span class="value" id="displayTF">3м</span>
            </div>
            <div class="item">
                <span class="label" id="lblAccuracy">Точность</span>
                <span class="value" id="displayAccuracy">—</span>
            </div>
            <div class="item">
                <span class="label" id="lblTime">До</span>
                <span class="value" id="displayTime">—</span>
            </div>
        </div>
    </div>

    <button class="btn-primary" id="getSignalBtn">🚀 ПОЛУЧИТЬ СИГНАЛ</button>

    <script>
        // ===== ЯЗЫКИ =====
        const LANGUAGES = {
            'ru': {
                title: '📊 TRADE SIGNAL',
                wait: '⏳ Ожидание',
                up: '📈 ВВЕРХ',
                down: '📉 ВНИЗ',
                tf: 'Таймфрейм',
                accuracy: 'Точность',
                time: 'До',
                getSignal: '🚀 ПОЛУЧИТЬ СИГНАЛ',
                generating: '⏳ ГЕНЕРАЦИЯ...',
                timer: '⏱️ ТАЙМЕР',
                trade_open: 'СДЕЛКА ОТКРЫТА'
            },
            'en': {
                title: '📊 TRADE SIGNAL',
                wait: '⏳ Waiting',
                up: '📈 UP',
                down: '📉 DOWN',
                tf: 'Timeframe',
                accuracy: 'Accuracy',
                time: 'Until',
                getSignal: '🚀 GET SIGNAL',
                generating: '⏳ GENERATING...',
                timer: '⏱️ TIMER',
                trade_open: 'TRADE OPEN'
            },
            'uk': {
                title: '📊 TRADE SIGNAL',
                wait: '⏳ Очікування',
                up: '📈 ВГОРУ',
                down: '📉 ВНИЗ',
                tf: 'Таймфрейм',
                accuracy: 'Точність',
                time: 'До',
                getSignal: '🚀 ОТРИМАТИ СИГНАЛ',
                generating: '⏳ ГЕНЕРАЦІЯ...',
                timer: '⏱️ ТАЙМЕР',
                trade_open: 'УГОДА ВІДКРИТА'
            },
            'kz': {
                title: '📊 TRADE SIGNAL',
                wait: '⏳ Күту',
                up: '📈 ЖОҒАРЫ',
                down: '📉 ТӨМЕН',
                tf: 'Уақыт аралығы',
                accuracy: 'Дәлдік',
                time: 'Дейін',
                getSignal: '🚀 СИГНАЛ АЛУ',
                generating: '⏳ ЖАСАЛУДА...',
                timer: '⏱️ ТАЙМЕР',
                trade_open: 'МӘМІЛЕ АШЫЛДЫ'
            }
        };

        let currentLang = 'ru';

        function getLang() {
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang');
            if (lang && LANGUAGES[lang]) currentLang = lang;
            return currentLang;
        }

        function t(key) { return LANGUAGES[currentLang][key] || key; }

        function setLang(lang) {
            if (!LANGUAGES[lang]) return;
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === lang);
            });
            updateUI();
        }

        // ===== КОНФИГ =====
        const PAIRS = [
            'EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD',
            'EUR/GBP', 'EUR/JPY', 'GBP/JPY', 'USD/CHF', 'NZD/USD',
            'EUR/AUD', 'GBP/AUD', 'AUD/JPY', 'CAD/JPY', 'CHF/JPY',
            'EUR/CAD', 'GBP/CHF', 'AUD/CAD', 'NZD/JPY', 'USD/SEK'
        ];

        // ===== СОСТОЯНИЕ =====
        let state = {
            pair: 'EUR/USD',
            tf: '3м',
            balance: 1000,
            isWaiting: false,
            isTradeOpen: false,
            timerInterval: null,
            timerSeconds: 0
        };

        // ===== DOM =====
        const pairSelector = document.getElementById('pairSelector');
        const tfBtns = document.querySelectorAll('.tf-btn');
        const signalCard = document.getElementById('signalCard');
        const currentPair = document.getElementById('currentPair');
        const signalBadge = document.getElementById('signalBadge');
        const signalDirection = document.getElementById('signalDirection');
        const timerDisplay = document.getElementById('timerDisplay');
        const displayTF = document.getElementById('displayTF');
        const displayAccuracy = document.getElementById('displayAccuracy');
        const displayTime = document.getElementById('displayTime');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const getSignalBtn = document.getElementById('getSignalBtn');

        // ===== РЕНДЕР ПАР =====
        function renderPairs() {
            pairSelector.innerHTML = '';
            PAIRS.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `pair-btn ${p === state.pair ? 'active' : ''}`;
                btn.textContent = p;
                btn.dataset.pair = p;
                btn.addEventListener('click', () => selectPair(p));
                pairSelector.appendChild(btn);
            });
        }

        function selectPair(pair) {
            if (state.isTradeOpen) {
                alert('❌ Сделка уже открыта! Дождитесь завершения.');
                return;
            }
            state.pair = pair;
            document.querySelectorAll('.pair-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.pair === pair);
            });
            currentPair.innerHTML = `${pair} <small>Forex</small>`;
            resetSignal();
        }

        // ===== ТАЙМФРЕЙМ =====
        tfBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (state.isTradeOpen) {
                    alert('❌ Сделка уже открыта! Дождитесь завершения.');
                    return;
                }
                tfBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.tf = btn.dataset.tf;
                displayTF.textContent = state.tf;
                resetSignal();
            });
        });

        // ===== СБРОС СИГНАЛА =====
        function resetSignal() {
            signalBadge.className = 'signal-badge waiting';
            signalBadge.textContent = t('wait');
            signalDirection.textContent = '⟷';
            signalDirection.className = 'signal-direction';
            displayAccuracy.textContent = '—';
            displayTime.textContent = '—';
            signalCard.classList.remove('active');
            signalCard.classList.remove('waiting');
            timerDisplay.style.display = 'none';
            getSignalBtn.disabled = false;
            getSignalBtn.textContent = t('getSignal');
            state.isTradeOpen = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        // ===== ТАЙМЕР =====
        function startTimer(seconds, callback) {
            state.timerSeconds = seconds;
            timerDisplay.style.display = 'block';
            timerDisplay.textContent = `⏱️ ${formatTime(seconds)}`;
            
            signalBadge.className = 'signal-badge timer';
            signalBadge.textContent = t('timer');
            signalDirection.textContent = '⏳';
            signalDirection.className = 'signal-direction timer';
            signalCard.classList.add('waiting');

            state.timerInterval = setInterval(() => {
                state.timerSeconds--;
                timerDisplay.textContent = `⏱️ ${formatTime(state.timerSeconds)}`;
                
                if (state.timerSeconds <= 0) {
                    clearInterval(state.timerInterval);
                    state.timerInterval = null;
                    timerDisplay.style.display = 'none';
                    callback();
                }
            }, 1000);
        }

        function formatTime(seconds) {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        // ===== ГЕНЕРАЦИЯ СИГНАЛА =====
        function generateSignal() {
            const direction = Math.random() > 0.5 ? 'up' : 'down';
            const accuracy = Math.floor(Math.random() * 25) + 70;
            const time = new Date();
            time.setMinutes(time.getMinutes() + Math.floor(Math.random() * 10) + 3);
            const timeStr = time.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            return {
                pair: state.pair,
                tf: state.tf,
                direction: direction,
                accuracy: accuracy,
                time: timeStr
            };
        }

        // ===== ПОКАЗАТЬ СИГНАЛ =====
        function showSignal(signal) {
            const isUp = signal.direction === 'up';
            signalBadge.className = `signal-badge ${isUp ? 'up' : 'down'}`;
            signalBadge.textContent = isUp ? t('up') : t('down');

            signalDirection.textContent = isUp ? '↗' : '↘';
            signalDirection.className = `signal-direction ${signal.direction}`;

            displayAccuracy.textContent = signal.accuracy + '%';
            displayTime.textContent = signal.time;

            signalCard.classList.add('active');
            signalCard.classList.remove('waiting');
            timerDisplay.style.display = 'none';
        }

        // ===== ОБНОВЛЕНИЕ UI =====
        function updateUI() {
            document.getElementById('appTitle').textContent = t('title');
            if (!state.isTradeOpen) {
                getSignalBtn.textContent = t('getSignal');
            }
            document.getElementById('lblTF').textContent = t('tf');
            document.getElementById('lblAccuracy').textContent = t('accuracy');
            document.getElementById('lblTime').textContent = t('time');
        }

        // ===== ПОЛУЧИТЬ СИГНАЛ =====
        getSignalBtn.addEventListener('click', () => {
            if (state.isWaiting) return;
            if (state.isTradeOpen) {
                alert('❌ Сделка уже открыта! Дождитесь завершения.');
                return;
            }

            state.isWaiting = true;
            state.isTradeOpen = true;
            getSignalBtn.disabled = true;
            getSignalBtn.textContent = t('generating');

            signalCard.style.transition = 'all 0.3s';
            signalCard.style.transform = 'scale(0.97)';
            signalCard.style.opacity = '0.6';

            // Получаем время в секундах из выбранного таймфрейма
            let seconds = 60; // 1м по умолчанию
            if (state.tf === '3м') seconds = 180;
            else if (state.tf === '5м') seconds = 300;
            else if (state.tf === '15м') seconds = 900;
            else if (state.tf === '30м') seconds = 1800;
            else if (state.tf === '1ч') seconds = 3600;

            // Запускаем таймер
            startTimer(seconds, () => {
                // Таймер завершен — показываем сигнал
                const signal = generateSignal();
                state.isWaiting = false;
                state.isTradeOpen = false;
                getSignalBtn.disabled = false;
                getSignalBtn.textContent = t('getSignal');
                signalCard.style.transform = 'scale(1)';
                signalCard.style.opacity = '1';
                showSignal(signal);
            });
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        const lang = getLang();
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === lang);
        });
        renderPairs();
        currentPair.innerHTML = `${state.pair} <small>Forex</small>`;
        displayTF.textContent = state.tf;
        balanceDisplay.textContent = state.balance;
        updateUI();

        // НЕ ПОКАЗЫВАЕМ СИГНАЛ ПРИ ЗАГРУЗКЕ
        resetSignal();

        // ===== ТЕЛЕГРАМ =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        console.log('✅ Mini App загружена, язык:', currentLang);
    </script>
</body>
</html>
